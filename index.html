<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Blog Platform</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg"></div>

    <header class="navbar glass">
        <h1>BlogSphere</h1>

        <div id="userSection">
            <button id="showLoginBtn" class="btn">Login</button>
            <button id="showRegisterBtn" class="btn gradient-btn">Register</button>
        </div>

        <div id="profileSection" class="hidden">
            <span id="profileName"></span>
            <button id="logoutBtn" class="btn danger">Logout</button>
        </div>
    </header>

    <main class="container">

        <!-- AUTH -->
        <section id="authSection">

            <div class="auth-grid">

                <div class="glass auth-card">
                    <h2>Login</h2>

                    <form id="loginForm">
                        <input
                            type="text"
                            id="loginUsername"
                            placeholder="Username"
                            required
                        />

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Password"
                            required
                        />

                        <button type="submit" class="btn gradient-btn">
                            Login
                        </button>
                    </form>
                </div>

                <div class="glass auth-card">
                    <h2>Register</h2>

                    <form id="registerForm">

                        <input
                            type="text"
                            id="registerUsername"
                            placeholder="Username"
                            required
                        />

                        <input
                            type="password"
                            id="registerPassword"
                            placeholder="Password"
                            required
                        />

                        <button type="submit" class="btn gradient-btn">
                            Register
                        </button>
                    </form>
                </div>

            </div>

        </section>

        <!-- BLOG SECTION -->
        <section id="blogSection" class="hidden">

            <div class="glass create-post-card">

                <h2>Create New Post</h2>

                <form id="postForm">

                    <input
                        type="text"
                        id="postTitle"
                        placeholder="Post Title"
                        required
                    />

                    <textarea
                        id="postContent"
                        placeholder="Write your content..."
                        rows="6"
                        required
                    ></textarea>

                    <button type="submit" class="btn gradient-btn">
                        Publish Post
                    </button>

                </form>

            </div>

            <div id="postsContainer"></div>

        </section>

    </main>

    <div id="toast"></div>

    <script src="script.js"></script>

</body>
</html>
